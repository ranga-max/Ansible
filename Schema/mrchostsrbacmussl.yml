       kafka_broker_custom_properties:
         broker.rack: us-east-1b
    kafka-2.rrchakdc1.ans.test.io:
        broker_id: 3
        kafka_broker_keytab_path: /etc/security/keytabs/kafka-2.keytab  
        kafka_broker_kerberos_keytab_path: /home/ubuntu/Ansible/Schema/kerberos/keytabs/_data/kafka-2.keytab
        kafka_broker_kerberos_principal: kafka/kafka-2.rrchakdc1.ans.test.io@TEST.CONFLUENT.IO
        kafka_broker_custom_properties:
          broker.rack: us-east-1b
